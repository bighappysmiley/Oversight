name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk oversight.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oversight-apk
          path: oversight.apk

      # Public repo → stable download URL, refreshed on every main push:
      # https://github.com/bighappysmiley/Oversight/releases/download/android-latest/oversight.apk
      - name: Publish to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Oversight for Android (latest)
          prerelease: true
          files: oversight.apk
