name: Build Mac app

on:
  push:
    branches: [main]
    paths:
      - 'apple/macos-app/**'
      - '.github/workflows/build-mac-app.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Oversight.app
        working-directory: apple/macos-app
        run: |
          osacompile -o "Oversight.app" oversight.applescript
          mkdir -p "Oversight.app/Contents/Resources"
          cp install-agent.sh "Oversight.app/Contents/Resources/install-agent.sh"
          chmod +x "Oversight.app/Contents/Resources/install-agent.sh"
          ditto -c -k --sequesterRsrc --keepParent "Oversight.app" "Oversight-Mac.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oversight-Mac
          path: apple/macos-app/Oversight-Mac.zip

      # Public repo → this download URL is stable and updates on every main push:
      # https://github.com/bighappysmiley/Oversight/releases/download/mac-latest/Oversight-Mac.zip
      - name: Publish to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mac-latest
          name: Oversight for Mac (latest)
          prerelease: true
          files: apple/macos-app/Oversight-Mac.zip
