name: Build Mac DMGs

# Builds real macOS .dmg installers on a macOS runner (the only place
# Apple's hdiutil is available) and commits them back to the repo so
# Netlify can serve them. Linux build environments cannot produce a
# working DMG — they strip the .app's execute bit and mangle bundle names.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/nice-noether-zTKW5
      - main
    paths:
      - 'downloads/Oversight Installer.app/**'
      - 'downloads/oversight-mac.command'
      - '.github/workflows/build-mac-dmg.yml'

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build DMGs with hdiutil
        run: |
          set -e
          cd downloads

          # Convert the PNG icon to a proper .icns using macOS iconutil.
          ICONSET="AppIcon.iconset"
          SRC="Oversight Installer.app/Contents/Resources/AppIcon.png"
          mkdir -p "$ICONSET"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size "$SRC" --out "$ICONSET/icon_${size}x${size}.png" >/dev/null
            sips -z $((size*2)) $((size*2)) "$SRC" --out "$ICONSET/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o "Oversight Installer.app/Contents/Resources/AppIcon.icns"
          rm -rf "$ICONSET"

          # Keep the installer script and the app's executable bit in sync.
          cp oversight-mac.command "Oversight Installer.app/Contents/MacOS/applet"
          chmod +x "Oversight Installer.app/Contents/MacOS/applet"
          xattr -cr "Oversight Installer.app" || true

          for arch in apple-silicon intel; do
            case "$arch" in
              apple-silicon) VOL="Oversight (Apple Silicon)";;
              intel)         VOL="Oversight (Intel)";;
            esac
            STAGING="$(mktemp -d)"
            cp -R "Oversight Installer.app" "$STAGING/"
            ln -s /Applications "$STAGING/Applications"
            rm -f "oversight-mac-$arch.dmg"
            hdiutil create \
              -volname "$VOL" \
              -srcfolder "$STAGING" \
              -ov -format UDZO \
              "oversight-mac-$arch.dmg"
            cp "oversight-mac-$arch.dmg" "../nextjs/public/downloads/oversight-mac-$arch.dmg"
            rm -rf "$STAGING"
          done

      - name: Commit DMGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/*.dmg nextjs/public/downloads/*.dmg
          if git diff --cached --quiet; then
            echo "No DMG changes to commit."
          else
            git commit -m "Build macOS DMGs on macOS runner"
            git push
          fi
