[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/downloads/*"
  [headers.values]
    Content-Disposition = "attachment"
    X-Robots-Tag = "noindex"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/api/dns/*"
  [headers.values]
    Content-Type = "application/dns-json"
