# Oversight — Netlify configuration
# The site is a plain static front-end in /public plus serverless functions
# in /netlify/functions. No build step is required.

[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Clean URL for the device-side enrollment page (so /enroll?code=XXXX works).
[[redirects]]
  from = "/enroll"
  to = "/enroll.html"
  status = 200

# The /api/profile function sets its own application/x-apple-aspen-config MIME
# type so Safari offers to install the profile instead of downloading text.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Always revalidate CSS/JS so site updates show immediately after a deploy
# (prevents stale stylesheets/scripts being served from browser cache).
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# The kill-switch service worker must never be cached.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# The Android package, when present, should always download rather than render.
[[headers]]
  for = "/downloads/*"
  [headers.values]
    Content-Disposition = "attachment"
    Cache-Control = "no-cache, no-store, must-revalidate"
